# Trait definitions — each trait is an independent capability.
# "Where do I put this?" → pick the trait that answers the right question.
#
#   base       — does this machine exist?        (all machines)
#   gui        — does it have a screen?           (bars, nordhealth, archbook)
#   personal   — is it mine for fun?              (bars, archbook, totoro)
#   work       — is it for work?                  (nordhealth)
#
# developer trait removed — all machines are developer machines.
# desktop renamed to gui — clearer about what it means.
