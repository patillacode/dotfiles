# Trait packages — unified cross-platform package definitions.
# Each package defined once. Optional per-OS name overrides via 'apt' key.
# Casks use 'type: cask'. Default type is 'formula'.
#
# Simple string     → formula, same name everywhere
# { name: x }       → formula with name x
# { name: x, apt: y }  → formula named x on brew, y on apt
# { name: x, type: cask }  → brew cask (macOS only)
# { name: x, type: cask, apt: y }  → cask on macOS, y on apt

trait_packages:
  base:
    - atuin
    - bat
    - bookokrat
    - btop
    - chezmoi
    - duf
    - eza
    - fastfetch
    - { name: fd, apt: fd-find }
    - fzf
    - gcc
    - gh
    - git-delta
    - git-lfs
    - glow
    - gum
    - jq
    - n
    - neovim
    - prek
    - ripgrep
    - rtk
    - ruff
    - starship
    - tmux
    - sesh
    - uv
    - csvlens
    - hexyl
    - wget
    - yazi
  gui:
    - { name: ghostty, type: cask }
    - { name: keepassxc, type: cask, apt: keepassxc }
    - { name: raycast, type: cask }
    - { name: rectangle, type: cask }
    - { name: sf-symbols, type: cask }
    - { name: stats, type: cask }
  personal:
    - cmatrix
    - ffmpeg
    - socat
    - ffmpegthumbnailer
    - figlet
    - imagemagick
    - mpv
    - ollama
    - poppler
    - streamlink
    - yt-dlp
    - { name: firefox, type: cask }
    - { name: jordanbaird-ice, type: cask }
    - { name: nextcloud, type: cask }
    - { name: telegram, type: cask }
    - { name: transmission, type: cask }
    - { name: vlc, type: cask }
    - { name: zen, type: cask }
  work:
    - { name: zen, type: cask }

# Python tools per trait (installed via uv)
trait_python_tools:
  personal: []

# Nerd fonts (brew casks, macOS only)
nerd_fonts:
  - font-hack-nerd-font
  - font-fira-code-nerd-font
  - font-jetbrains-mono-nerd-font
