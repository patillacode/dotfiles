# Package lists per profile and OS
packages:
  brew_formulae:
    base:
      - atuin
      - bat
      - btop
      - duf
      - eza
      - fastfetch
      - fd
      - fzf
      - gh
      - git-delta
      - git-lfs
      - jq
      - ripgrep
      - starship
      - tmux
      - wget
    developer:
      - gcc
      - glow
      - n
      - neovim
      - nvm
      - rtk
      - uv
    personal:
      - cmatrix
      - ffmpeg
      - ffmpegthumbnailer
      - figlet
      - imagemagick
      - mpv
      - ollama
      - poppler
      - streamlink

  brew_casks:
    base:
      - ghostty
      - keepassxc
      - raycast
      - rectangle
      - sf-symbols
      - stats
    personal:
      - firefox
      - jordanbaird-ice
      - owncloud
      - telegram
      - transmission
      - vlc
      - zen
    work:
      - zen

  apt:
    # Installed via apt ONLY when Homebrew is not active (use_homebrew = false).
    # These mirror brew_formulae.base — on Homebrew machines, brew provides them instead.
    # Keep both lists in sync if you add a new base tool.
    base:
      - bat
      - btop
      - build-essential
      - curl
      - duf
      - eza
      - fd-find
      - fzf
      - git
      - git-lfs
      - jq
      - neovim
      - ripgrep
      - tmux
      - wget

    # Always installed via apt regardless of Homebrew.
    # Use this for tools that have no brew formula or must come from the system package manager.
    always:
      - keepassxc

  pacman:
    base:
      - atuin
      - bat
      - btop
      - curl
      - fd
      - fzf
      - git
      - git-delta
      - jq
      - neovim
      - ripgrep
      - starship
      - tmux
      - wget
    developer:
      - gcc
      - glow
      - keepassxc
      - n
      - nvm
    personal:
      - cmatrix
      - ffmpeg
      - figlet
      - imagemagick
      - mpv
      - ollama
      - python-yt-dlp
      - streamlink

  python_tools:
    developer:
      - ruff
      - prek
    personal:
      - yt-dlp

  nerd_fonts:
    - font-hack-nerd-font
    - font-fira-code-nerd-font
    - font-jetbrains-mono-nerd-font
