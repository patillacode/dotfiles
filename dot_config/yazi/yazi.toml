[opener]
edit = [
  { run = 'vim "$@"',      block = true,   desc = "vim" },
  { run = 'nvim "$@"',     block = true,   desc = "nvim" },
  { run = 'zed "$@"',                      desc = "Zed" },
]
play = [
  { run = 'mpv "$@"',      orphan = true,  desc = "mpv" },
  { run = 'vlc "$@"',      orphan = true,  desc = "VLC" },
]
play_audio = [
  { run = 'mpv "$@"',      orphan = true,  desc = "mpv" },
]
view_pdf = [
  { run = 'zathura "$@"',  orphan = true,  desc = "zathura" },
]
browse_csv = [
  { run = 'csvlens "$@"',  block = true,   desc = "csvlens" },
  { run = 'vim "$@"',      block = true,   desc = "vim" },
]
extract_arc = [
  { run = 'extract "$@"',  block = true,   desc = "extract" },
]

[open]
rules = [
  { mime = "text/csv",                      use = "browse_csv" },
  { mime = "text/*",                        use = "edit" },
  { mime = "application/json",              use = "edit" },
  { mime = "application/xml",               use = "edit" },
  { mime = "video/*",                       use = "play" },
  { mime = "audio/*",                       use = "play_audio" },
  { mime = "application/pdf",               use = "view_pdf" },
  { mime = "application/zip",               use = "extract_arc" },
  { mime = "application/x-tar",             use = "extract_arc" },
  { mime = "application/gzip",              use = "extract_arc" },
  { mime = "application/x-bzip2",           use = "extract_arc" },
  { mime = "application/x-xz",             use = "extract_arc" },
  { mime = "application/x-7z-compressed",   use = "extract_arc" },
  { mime = "application/x-rar-compressed",  use = "extract_arc" },
  { mime = "*",                              use = "edit" },
]

[plugin]
prepend_previewers = [
  { mime = "application/octet-stream", run = "hexyl" },
]
