# catppuccin.toml — Catppuccin Mocha palette

add_newline = true
palette = "catppuccin_mocha"

format = """
$sudo\
${custom.python_version}\
$directory\
$git_branch$git_status\
$character\
"""

right_format = """
$docker_context\
$time\
"""

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
overlay2  = "#9399b2"
surface2  = "#585b70"
surface1  = "#45475a"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"

[character]
success_symbol = "[❯](bold fg:green)"
error_symbol   = "[❯](bold fg:red)"

[directory]
format            = "[ $path](bold fg:blue)"
truncation_length = 2
truncation_symbol = "…/"
home_symbol       = "~"

[git_branch]
symbol = " "
style  = "fg:mauve"
format = "[ $symbol$branch]($style)"

[git_status]
format    = "[$all_status$ahead_behind](fg:peach)"
modified  = "!"
untracked = "?"
staged    = "+"
deleted   = "✘"
ahead     = "⇡"
behind    = "⇣"
diverged  = "⇕"

[time]
disabled    = false
time_format = "%R"
style       = "fg:overlay2"
format      = "[$time]($style)"

[custom.python_version]
description = "Active Python venv version"
command     = "echo \"$(python --version | awk '{split($2, a, \".\"); print a[1] \".\" a[2]}')\""
when        = '[[ -n "$VIRTUAL_ENV" ]]'
style       = "fg:yellow"
format      = "[ $output]($style) "

[docker_context]
symbol = " "
format = "[$symbol$context](fg:sapphire) "

[sudo]
style    = "bold fg:red"
symbol   = " "
format   = "[$symbol]($style)"
disabled = false
