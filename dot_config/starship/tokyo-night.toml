# tokyo-night.toml — Tokyo Night Storm palette

add_newline = true
palette = "tokyo_night"

format = """
$sudo\
${custom.python_version}\
$directory\
$git_branch$git_status\
$character\
"""

right_format = """
$docker_context\
$time\
"""

[palettes.tokyo_night]
bg       = "#1a1b26"
bg_dark  = "#16161e"
bg_hl    = "#2ac3de"
fg       = "#c0caf5"
comment  = "#565f89"
blue     = "#7aa2f7"
cyan     = "#7dcfff"
green    = "#9ece6a"
magenta  = "#bb9af7"
orange   = "#ff9e64"
red      = "#f7768e"
yellow   = "#e0af68"
teal     = "#2ac3de"

[character]
success_symbol = "[❯](bold fg:green)"
error_symbol   = "[❯](bold fg:red)"

[directory]
format            = "[ $path](bold fg:blue)"
truncation_length = 2
truncation_symbol = "…/"
home_symbol       = "~"

[git_branch]
symbol = " "
style  = "fg:magenta"
format = "[ $symbol$branch]($style)"

[git_status]
format    = "[$all_status$ahead_behind](fg:orange)"
modified  = "!"
untracked = "?"
staged    = "+"
deleted   = "✘"
ahead     = "⇡"
behind    = "⇣"
diverged  = "⇕"

[time]
disabled    = false
time_format = "%R"
style       = "fg:comment"
format      = "[$time]($style)"

[custom.python_version]
description = "Active Python venv version"
command     = "echo \"$(python --version | awk '{split($2, a, \".\"); print a[1] \".\" a[2]}')\""
when        = '[[ -n "$VIRTUAL_ENV" ]]'
style       = "fg:yellow"
format      = "[ $output]($style) "

[docker_context]
symbol = " "
format = "[$symbol$context](fg:teal) "

[sudo]
style    = "bold fg:red"
symbol   = " "
format   = "[$symbol]($style)"
disabled = false
